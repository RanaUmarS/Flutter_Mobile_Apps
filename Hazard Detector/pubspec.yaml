name: fire_alarm_app
description: ESP32 Fire Alarm System Flutter Companion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # WebSocket
  web_socket_channel: ^2.4.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Push Notifications (FCM)
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10

  # Charts
  fl_chart: ^0.68.0

  # Navigation
  go_router: ^13.2.0

  # Persistence
  shared_preferences: ^2.2.3

  # Utilities
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.2

  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.3        # ← ADDED

flutter_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon.png"

# ── Native splash config ──────────────────────────────────────────────────────
# Matches _SC.bg from splash_screen.dart so the transition is seamless.
# The minion appears on the same dark background before Flutter boots,
# then your Flutter SplashScreen animates the rings and text on top.
flutter_native_splash:
  color: "#080A0F"                      # identical to _SC.bg
  image: assets/icon.png
  color_dark: "#080A0F"
  image_dark: assets/icon.png
  fullscreen: true                      # hides status bar during native splash
  android_12:
    color: "#080A0F"
    icon_background_color: "#080A0F"
    image: assets/icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png